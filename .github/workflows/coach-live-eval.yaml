name: AlgoCoach Live AI Eval

on:
  schedule:
    - cron: '23 16 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment containing AI provider credentials
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: coach-live-eval-${{ inputs.environment || 'staging' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  live-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment || 'staging' }}
    env:
      NODE_VERSION: '22.13.0'
      PNPM_VERSION: '11.7.0'
      AI_RELAY_API_KEY: ${{ secrets.AI_RELAY_API_KEY }}
      AI_RELAY_BASE_URL: ${{ vars.AI_RELAY_BASE_URL }}
      AI_RELAY_PRIMARY_MODEL: ${{ vars.AI_RELAY_PRIMARY_MODEL || vars.ALGO_COACH_MODEL }}
      AI_RELAY_FALLBACK_MODEL: ${{ vars.AI_RELAY_FALLBACK_MODEL || vars.ALGO_COACH_FALLBACK_MODEL }}
      AI_RELAY_STRUCTURED_OUTPUT_MODE: ${{ vars.AI_RELAY_STRUCTURED_OUTPUT_MODE || 'json' }}
      AI_RELAY_PRICING_JSON: ${{ vars.AI_RELAY_PRICING_JSON }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_PROVIDER: postgresql
      DB_SCHEMA: algocoach
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require live evaluation credentials
        run: |
          if [ -z "$AI_RELAY_PRIMARY_MODEL" ] || [ -z "$AI_RELAY_FALLBACK_MODEL" ] || [ -z "$AI_RELAY_PRICING_JSON" ]; then
            echo "Two relay models and actual pricing must be configured in the selected GitHub Environment."
            exit 1
          fi
      - name: Verify relay protocol and both configured models
        run: pnpm ai:preflight
        env:
          NODE_ENV: production
      - name: Run live evaluation quality gate
        run: pnpm eval:coach:live
        env:
          NODE_ENV: production
