name: AlgoCoach CI and Release

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main', 'dev']
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment containing release secrets
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('{0}-release-{1}', github.workflow, inputs.environment) || format('{0}-ci-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

env:
  NODE_VERSION: '22.13.0'
  PNPM_VERSION: '11.7.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Format, types, lint, unit, AI eval
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm lint:ci
      - run: pnpm test:coverage
      - run: pnpm eval:coach
      - run: pnpm eval:coach:live:corpus
      - run: pnpm budget:editor

  postgres-integration:
    name: PostgreSQL migrations and restricted role
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: algocoach_test
          POSTGRES_USER: migrator
          POSTGRES_PASSWORD: migration-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U migrator -d algocoach_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_INTEGRATION_TEST: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_APPLICATION_ROLE: algocoach_app
      DATABASE_URL: postgresql://algocoach_app:application-test-password@127.0.0.1:5432/algocoach_test
      MIGRATION_DATABASE_URL: postgresql://migrator:migration-test-password@127.0.0.1:5432/algocoach_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:db:integration

  build:
    name: Production build
    needs: [quality, postgres-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SECRET: ci-only-auth-secret-with-at-least-32-characters
      DB_CATALOG_ENABLED: 'true'
      CATALOG_SYNC_ENABLED: 'false'
      TYPESCRIPT_ENABLED: 'true'
      GOOGLE_AUTH_ENABLED: 'false'
      GOOGLE_ONE_TAP_ENABLED: 'false'
      AI_RELAY_API_KEY: ci-only-relay-key
      AI_RELAY_BASE_URL: https://relay.invalid/v1
      AI_RELAY_PRIMARY_MODEL: relay-primary
      AI_RELAY_FALLBACK_MODEL: relay-fallback
      AI_RELAY_STRUCTURED_OUTPUT_MODE: json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm budget:coach

  e2e:
    name: Playwright
    needs: [quality, postgres-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run three retry-free browser stability rounds
        run: pnpm test:e2e --repeat-each=3 --retries=0
      - name: Upload Playwright diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  docker-smoke:
    name: Docker build and smoke
    needs: [build, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: algocoach_test
          POSTGRES_USER: migrator
          POSTGRES_PASSWORD: migration-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U migrator -d algocoach_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_INTEGRATION_TEST: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_APPLICATION_ROLE: algocoach_app
      DATABASE_URL: postgresql://algocoach_app:application-test-password@127.0.0.1:5432/algocoach_test
      MIGRATION_DATABASE_URL: postgresql://migrator:migration-test-password@127.0.0.1:5432/algocoach_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:db:integration
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - name: Build smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: algocoach:ci
          cache-from: type=gha,scope=docker-smoke
          cache-to: type=gha,scope=docker-smoke,mode=min,ignore-error=true
      - name: Start Redis REST smoke dependency
        run: node scripts/redis-rest-smoke.mjs > /tmp/redis-rest-smoke.log 2>&1 &
      - name: Start smoke container
        run: >-
          docker run --detach --rm --name algocoach-smoke
          --add-host host.docker.internal:host-gateway
          --publish 3200:3000
          --env DATABASE_PROVIDER=postgresql
          --env DATABASE_APPLICATION_ROLE=algocoach_app
          --env DATABASE_URL=postgresql://algocoach_app:application-test-password@host.docker.internal:5432/algocoach_test
          --env DB_AUTO_MIGRATE=false
          --env DB_CATALOG_ENABLED=true
          --env CATALOG_SYNC_ENABLED=false
          --env TYPESCRIPT_ENABLED=true
          --env NEXT_PUBLIC_APP_URL=https://algocoach.test
          --env NEXT_PUBLIC_SUPPORT_EMAIL=support@algocoach.test
          --env AUTH_URL=https://algocoach.test
          --env AUTH_SECRET=ci-only-auth-secret-with-at-least-32-characters
          --env EMAIL_AUTH_ENABLED=false
          --env GITHUB_AUTH_ENABLED=false
          --env DURABLE_GUEST_CLAIM_ENABLED=false
          --env NEXT_PUBLIC_DURABLE_GUEST_CLAIM_ENABLED=false
          --env ANONYMOUS_METRICS_ENABLED=false
          --env SUMMARY_CATALOG_ENABLED=true
          --env AI_RELAY_API_KEY=ci-only-relay-key
          --env AI_RELAY_BASE_URL=https://relay.invalid/v1
          --env AI_RELAY_PRIMARY_MODEL=relay-primary
          --env AI_RELAY_FALLBACK_MODEL=relay-fallback
          --env AI_RELAY_STRUCTURED_OUTPUT_MODE=json
          --env 'AI_RELAY_PRICING_JSON={"relay-primary":{"inputPerMillionUsd":1,"outputPerMillionUsd":2},"relay-fallback":{"inputPerMillionUsd":1,"outputPerMillionUsd":2}}'
          --env AI_RELAY_CANARY_TOKEN=ci-only-canary-token-with-at-least-32-characters
          --env SENTRY_DSN=https://public@example.test/1
          --env NEXT_PUBLIC_SENTRY_DSN=https://public@example.test/1
          --env REDIS_URL=http://host.docker.internal:8079
          --env REDIS_TOKEN=ci-redis-token
          --env REDIS_ALLOW_INSECURE_LOCAL=true
          --env TRUSTED_PROXY_HEADERS=x-forwarded-for
          --env GOOGLE_AUTH_ENABLED=true
          --env GOOGLE_ONE_TAP_ENABLED=false
          --env GOOGLE_CLIENT_ID=ci-google-client-id
          --env GOOGLE_CLIENT_SECRET=ci-google-client-secret
          algocoach:ci
      - name: Verify image endpoints and container health
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3200/api/health/live >/dev/null; then
              break
            fi
            if [ "$attempt" = "60" ]; then
              docker logs algocoach-smoke
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:3200/api/health/ready >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3200/about >/dev/null
          for attempt in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' algocoach-smoke)
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ] || [ "$attempt" = "30" ]; then
              docker logs algocoach-smoke
              exit 1
            fi
            sleep 1
          done
      - name: Show container logs on failure
        if: failure()
        run: docker logs algocoach-smoke
      - name: Stop smoke container
        if: always()
        run: docker rm --force algocoach-smoke || true

  release-migration:
    name: ${{ inputs.environment }} database release
    if: github.event_name == 'workflow_dispatch'
    needs: [quality, postgres-integration, build, e2e, docker-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ inputs.environment }}
    env:
      DATABASE_PROVIDER: postgresql
      DATABASE_APPLICATION_ROLE: ${{ vars.DATABASE_APPLICATION_ROLE }}
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      DATABASE_RELEASE_ID: ${{ github.sha }}
      DATABASE_RELEASE_CHANNEL: ${{ inputs.environment }}
    steps:
      - name: Restrict production releases to main
        if: inputs.environment == 'production' && github.ref_name != 'main'
        run: |
          echo "Production releases must run from main."
          exit 1
      - name: Validate release database configuration
        run: |
          if [ -z "$MIGRATION_DATABASE_URL" ] || [ -z "$DATABASE_APPLICATION_ROLE" ]; then
            echo "Configure MIGRATION_DATABASE_URL and DATABASE_APPLICATION_ROLE in the selected GitHub Environment."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm db:migrate:release
      - run: pnpm db:mark-release

  release-ai-smoke:
    name: ${{ inputs.environment }} AI relay gate
    if: github.event_name == 'workflow_dispatch'
    needs: [release-migration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    env:
      AI_RELAY_API_KEY: ${{ secrets.AI_RELAY_API_KEY }}
      AI_RELAY_BASE_URL: ${{ vars.AI_RELAY_BASE_URL }}
      AI_RELAY_PRIMARY_MODEL: ${{ vars.AI_RELAY_PRIMARY_MODEL }}
      AI_RELAY_FALLBACK_MODEL: ${{ vars.AI_RELAY_FALLBACK_MODEL }}
      AI_RELAY_STRUCTURED_OUTPUT_MODE: ${{ vars.AI_RELAY_STRUCTURED_OUTPUT_MODE || 'json' }}
      AI_RELAY_PRICING_JSON: ${{ vars.AI_RELAY_PRICING_JSON }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
      ALGO_COACH_MODEL: ${{ vars.ALGO_COACH_MODEL }}
      ALGO_COACH_FALLBACK_MODEL: ${{ vars.ALGO_COACH_FALLBACK_MODEL }}
      ALGO_COACH_PARSE_MODEL: ${{ vars.ALGO_COACH_PARSE_MODEL }}
      ALGO_COACH_PARSE_FALLBACK_MODEL: ${{ vars.ALGO_COACH_PARSE_FALLBACK_MODEL }}
      ALGO_COACH_DIAGNOSE_MODEL: ${{ vars.ALGO_COACH_DIAGNOSE_MODEL }}
      ALGO_COACH_DIAGNOSE_FALLBACK_MODEL: ${{ vars.ALGO_COACH_DIAGNOSE_FALLBACK_MODEL }}
      ALGO_COACH_HINT_MODEL: ${{ vars.ALGO_COACH_HINT_MODEL }}
      ALGO_COACH_HINT_FALLBACK_MODEL: ${{ vars.ALGO_COACH_HINT_FALLBACK_MODEL }}
      ALGO_COACH_COUNTEREXAMPLE_MODEL: ${{ vars.ALGO_COACH_COUNTEREXAMPLE_MODEL }}
      ALGO_COACH_COUNTEREXAMPLE_FALLBACK_MODEL: ${{ vars.ALGO_COACH_COUNTEREXAMPLE_FALLBACK_MODEL }}
      ALGO_COACH_REVIEW_CARD_MODEL: ${{ vars.ALGO_COACH_REVIEW_CARD_MODEL }}
      ALGO_COACH_REVIEW_CARD_FALLBACK_MODEL: ${{ vars.ALGO_COACH_REVIEW_CARD_FALLBACK_MODEL }}
      ALGO_COACH_REVIEW_GRADE_MODEL: ${{ vars.ALGO_COACH_REVIEW_GRADE_MODEL }}
      ALGO_COACH_REVIEW_GRADE_FALLBACK_MODEL: ${{ vars.ALGO_COACH_REVIEW_GRADE_FALLBACK_MODEL }}
      ALGO_COACH_CHAT_MODEL: ${{ vars.ALGO_COACH_CHAT_MODEL }}
      ALGO_COACH_CHAT_FALLBACK_MODEL: ${{ vars.ALGO_COACH_CHAT_FALLBACK_MODEL }}
    steps:
      - name: Restrict production releases to main
        if: inputs.environment == 'production' && github.ref_name != 'main'
        run: |
          echo "Production releases must run from main."
          exit 1
      - name: Validate AI relay release configuration
        shell: bash
        run: |
          missing=()

          if [[ -n "$AI_RELAY_API_KEY" || -n "$AI_RELAY_BASE_URL" ]]; then
            [[ -n "$AI_RELAY_API_KEY" ]] || missing+=("AI_RELAY_API_KEY")
            [[ -n "$AI_RELAY_BASE_URL" ]] || missing+=("AI_RELAY_BASE_URL")
          elif [[ -z "$OPENROUTER_API_KEY" || -z "$OPENROUTER_BASE_URL" ]]; then
            missing+=("AI_RELAY_API_KEY/AI_RELAY_BASE_URL (or the complete legacy OPENROUTER pair)")
          fi

          if [[ -n "$AI_RELAY_PRIMARY_MODEL" || -n "$AI_RELAY_FALLBACK_MODEL" ]]; then
            [[ -n "$AI_RELAY_PRIMARY_MODEL" ]] || missing+=("AI_RELAY_PRIMARY_MODEL")
            [[ -n "$AI_RELAY_FALLBACK_MODEL" ]] || missing+=("AI_RELAY_FALLBACK_MODEL")
            primary_model="$AI_RELAY_PRIMARY_MODEL"
            fallback_model="$AI_RELAY_FALLBACK_MODEL"
          else
            [[ -n "$ALGO_COACH_MODEL" ]] || missing+=("AI_RELAY_PRIMARY_MODEL (or legacy ALGO_COACH_MODEL)")
            [[ -n "$ALGO_COACH_FALLBACK_MODEL" ]] || missing+=("AI_RELAY_FALLBACK_MODEL (or legacy ALGO_COACH_FALLBACK_MODEL)")
            primary_model="$ALGO_COACH_MODEL"
            fallback_model="$ALGO_COACH_FALLBACK_MODEL"
          fi

          [[ -n "$AI_RELAY_PRICING_JSON" ]] || missing+=("AI_RELAY_PRICING_JSON")

          if (( ${#missing[@]} )); then
            printf '::error title=Incomplete AI relay configuration::Missing GitHub Environment values: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          if [[ "$primary_model" == "$fallback_model" ]]; then
            echo "::error title=Invalid AI relay configuration::Primary and fallback models must be different."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Verify relay protocol and both configured models
        id: relay_preflight
        run: pnpm ai:preflight -- --github-output
        env:
          NODE_ENV: production
      - name: Run the 10-case release smoke suite
        run: pnpm eval:coach:smoke
        env:
          NODE_ENV: production
          AI_RELAY_STRUCTURED_OUTPUT_MODE: ${{ steps.relay_preflight.outputs.structured_output_mode }}

  publish:
    name: Publish immutable image
    if: github.event_name == 'workflow_dispatch'
    needs: [release-migration, release-ai-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ inputs.environment }}
            type=raw,value=latest,enable=${{ inputs.environment == 'production' && github.ref_name == 'main' }}
      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,scope=release,mode=max,ignore-error=true
          provenance: mode=max
          sbom: true

  deploy-vercel:
    name: Deploy ${{ inputs.environment }} to Vercel
    if: github.event_name == 'workflow_dispatch'
    needs: [release-ai-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      NODE_ENV: production
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      EXPECTED_AI_RELAY_CANARY_TOKEN: ${{ secrets.AI_RELAY_CANARY_TOKEN }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      DEPLOYMENT_HEALTH_TIMEOUT_MS: ${{ vars.DEPLOYMENT_HEALTH_TIMEOUT_MS || '10000' }}
      SENTRY_RELEASE: ${{ github.sha }}
      NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
      EXPECTED_DATABASE_RELEASE_ID: ${{ github.sha }}
      EXPECTED_DATABASE_RELEASE_CHANNEL: ${{ inputs.environment }}
    steps:
      - name: Restrict production releases to main
        if: inputs.environment == 'production' && github.ref_name != 'main'
        run: |
          echo "Production releases must run from main."
          exit 1
      - name: Require Vercel deployment configuration
        shell: bash
        run: |
          missing=()
          [[ -n "$VERCEL_TOKEN" ]] || missing+=("VERCEL_TOKEN")
          [[ -n "$VERCEL_ORG_ID" ]] || missing+=("VERCEL_ORG_ID")
          [[ -n "$VERCEL_PROJECT_ID" ]] || missing+=("VERCEL_PROJECT_ID")
          [[ -n "$EXPECTED_AI_RELAY_CANARY_TOKEN" ]] || missing+=("AI_RELAY_CANARY_TOKEN")
          if (( ${#missing[@]} )); then
            printf '::error title=Incomplete Vercel configuration::Missing GitHub Environment values: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pull Vercel environment
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            pnpm exec vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            pnpm exec vercel pull --yes --environment=preview --git-branch="$GITHUB_REF_NAME" --token="$VERCEL_TOKEN"
          fi
      - name: Pull and validate target runtime environment
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            target_environment=production
            branch_args=()
          else
            target_environment=preview
            branch_args=(--git-branch="$GITHUB_REF_NAME")
          fi
          pnpm exec vercel env pull .env.vercel-target --yes --environment="$target_environment" "${branch_args[@]}" --token="$VERCEL_TOKEN"
          pnpm exec dotenv -e .env.vercel-target -- node -e '
            const required = [
              "DATABASE_URL",
              "DATABASE_APPLICATION_ROLE",
              "AI_RELAY_API_KEY",
              "AI_RELAY_BASE_URL",
              "AI_RELAY_PRIMARY_MODEL",
              "AI_RELAY_FALLBACK_MODEL",
              "AI_RELAY_CANARY_TOKEN",
              "SENTRY_DSN",
              "NEXT_PUBLIC_SENTRY_DSN",
              "SENTRY_ORG",
              "SENTRY_PROJECT",
              "SENTRY_AUTH_TOKEN",
            ];
            const missing = required.filter((name) => !process.env[name]?.trim());
            if (missing.length) throw new Error(`Missing Vercel target values: ${missing.join(", ")}`);
            if (process.env.AI_RELAY_CANARY_TOKEN !== process.env.EXPECTED_AI_RELAY_CANARY_TOKEN) {
              throw new Error("Vercel AI_RELAY_CANARY_TOKEN differs from the GitHub Environment secret.");
            }
          '
          pnpm exec dotenv -e .env.vercel-target -- pnpm health:runtime-config
          pnpm exec dotenv -e .env.vercel-target -- pnpm ai:preflight
          pnpm exec dotenv -e .env.vercel-target -- pnpm eval:coach:smoke
      - name: Build Vercel artifact
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            pnpm exec vercel build --prod --token="$VERCEL_TOKEN"
          else
            pnpm exec vercel build --token="$VERCEL_TOKEN"
          fi
      - name: Deploy immutable Vercel artifact
        id: deploy
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            deployment_url="$(pnpm exec vercel deploy --prebuilt --prod --skip-domain --yes --token="$VERCEL_TOKEN")"
          else
            deployment_url="$(pnpm exec vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN")"
          fi
          if [[ ! "$deployment_url" =~ ^https:// ]]; then
            echo "::error title=Invalid Vercel deployment URL::The deploy command did not return an HTTPS URL."
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $deployment_url" >> "$GITHUB_STEP_SUMMARY"
      - name: Run post-deploy readiness and AI canary
        run: pnpm health:deployment
        env:
          DEPLOYMENT_BASE_URL: ${{ steps.deploy.outputs.deployment_url }}
          AI_RELAY_CANARY_TOKEN: ${{ secrets.AI_RELAY_CANARY_TOKEN }}
      - name: Promote verified production deployment
        if: inputs.environment == 'production'
        run: >-
          pnpm exec vercel promote
          "${{ steps.deploy.outputs.deployment_url }}"
          --yes
          --token="$VERCEL_TOKEN"
