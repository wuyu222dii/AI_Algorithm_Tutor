name: AlgoCoach Deployment Canary

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Deployed GitHub Environment to verify
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: coach-deployment-canary-${{ inputs.environment || 'production' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deployment-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment || 'production' }}
    env:
      NODE_VERSION: '22.13.0'
      PNPM_VERSION: '11.7.0'
      DEPLOYMENT_BASE_URL: ${{ vars.DEPLOYMENT_BASE_URL }}
      DEPLOYMENT_HEALTH_TIMEOUT_MS: ${{ vars.DEPLOYMENT_HEALTH_TIMEOUT_MS || '10000' }}
      AI_RELAY_CANARY_TOKEN: ${{ secrets.AI_RELAY_CANARY_TOKEN }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - name: Resolve deployment canary configuration
        id: configuration
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          missing=()
          [[ -n "$DEPLOYMENT_BASE_URL" ]] || missing+=("DEPLOYMENT_BASE_URL")
          [[ -n "$AI_RELAY_CANARY_TOKEN" ]] || missing+=("AI_RELAY_CANARY_TOKEN")
          if (( ${#missing[@]} )); then
            if [[ "$EVENT_NAME" == "schedule" && -z "$DEPLOYMENT_BASE_URL" ]]; then
              echo "::warning title=Deployment canary skipped::Production has no DEPLOYMENT_BASE_URL yet. Add the deployed HTTPS origin to enable scheduled checks."
              echo "configured=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            printf '::error title=Incomplete deployment canary configuration::Missing GitHub Environment values: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        if: steps.configuration.outputs.configured == 'true'
      - uses: pnpm/action-setup@v4
        if: steps.configuration.outputs.configured == 'true'
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        if: steps.configuration.outputs.configured == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
        if: steps.configuration.outputs.configured == 'true'
      - name: Verify deployed liveness, readiness, and AI relay
        if: steps.configuration.outputs.configured == 'true'
        run: pnpm health:deployment
