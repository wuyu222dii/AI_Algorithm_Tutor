name: AlgoCoach Exercism Catalog Sync

on:
  schedule:
    - cron: '17 15 * * *'
  workflow_dispatch:
    inputs:
      bootstrap:
        description: Establish the one-time published catalog baseline
        required: false
        default: false
        type: boolean

concurrency:
  group: coach-exercism-catalog-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-database-candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: catalog-sync-production
    env:
      NODE_VERSION: '22.13.0'
      PNPM_VERSION: '11.7.0'
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: ${{ secrets.CATALOG_DATABASE_URL }}
      DB_SCHEMA: algocoach
      DB_SINGLETON_ENABLED: 'true'
      CATALOG_SYNC_ENABLED: 'true'
      EXERCISM_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate the restricted catalog writer URL
        run: pnpm catalog:db:preflight
      - name: Establish the one-time published baseline
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap == true
        env:
          CATALOG_BOOTSTRAP_ENABLED: 'true'
        run: pnpm catalog:bootstrap -- --reviewer "github:${GITHUB_ACTOR}"
      - name: Fetch candidates into PostgreSQL quarantine
        if: github.event_name == 'schedule' || inputs.bootstrap != true
        run: pnpm catalog:sync -- --trigger scheduled
      - name: Apply deterministic catalog quality gates
        if: github.event_name == 'schedule' || inputs.bootstrap != true
        run: pnpm catalog:validate
      # Publishing remains an explicit, reviewer-authenticated manual command.

  discover-review-drafts:
    needs: sync-database-candidates
    if: github.event_name == 'schedule' || inputs.bootstrap != true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: catalog-sync-production
    env:
      NODE_VERSION: '22.13.0'
      PNPM_VERSION: '11.7.0'
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: ${{ secrets.CATALOG_DATABASE_URL }}
      DB_SCHEMA: algocoach
      DB_SINGLETON_ENABLED: 'true'
      CATALOG_SYNC_ENABLED: 'true'
      CATALOG_DISCOVERY_ENABLED: 'true'
      CATALOG_DISCOVERY_INGEST_ENABLED: 'true'
      CATALOG_DISCOVERY_MAX_EXERCISES: '10'
      CATALOG_AI_DRAFT_ENABLED: ${{ vars.CATALOG_AI_DRAFT_ENABLED || 'false' }}
      CATALOG_AI_MODEL: ${{ vars.CATALOG_AI_MODEL || vars.AI_RELAY_PRIMARY_MODEL || vars.ALGO_COACH_MODEL }}
      AI_RELAY_API_KEY: ${{ secrets.AI_RELAY_API_KEY }}
      AI_RELAY_BASE_URL: ${{ vars.AI_RELAY_BASE_URL }}
      AI_RELAY_PRIMARY_MODEL: ${{ vars.AI_RELAY_PRIMARY_MODEL }}
      AI_RELAY_FALLBACK_MODEL: ${{ vars.AI_RELAY_FALLBACK_MODEL }}
      AI_RELAY_STRUCTURED_OUTPUT_MODE: ${{ vars.AI_RELAY_STRUCTURED_OUTPUT_MODE || 'json' }}
      AI_RELAY_PRICING_JSON: ${{ vars.AI_RELAY_PRICING_JSON }}
      # Legacy aliases remain for one release while catalog enrichment migrates.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
      ALGO_COACH_MODEL: ${{ vars.ALGO_COACH_MODEL }}
      ALGO_COACH_FALLBACK_MODEL: ${{ vars.ALGO_COACH_FALLBACK_MODEL }}
      EXERCISM_GITHUB_TOKEN: ${{ github.token }}
      DISCOVERY_REPORT: .catalog/exercism-discovery.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate the restricted catalog writer URL
        run: pnpm catalog:db:preflight
      - name: Validate optional catalog AI relay configuration
        if: env.CATALOG_AI_DRAFT_ENABLED == 'true'
        shell: bash
        run: |
          missing=()

          if [[ -n "$AI_RELAY_API_KEY" || -n "$AI_RELAY_BASE_URL" ]]; then
            [[ -n "$AI_RELAY_API_KEY" ]] || missing+=("AI_RELAY_API_KEY")
            [[ -n "$AI_RELAY_BASE_URL" ]] || missing+=("AI_RELAY_BASE_URL")
          elif [[ -z "$OPENROUTER_API_KEY" || -z "$OPENROUTER_BASE_URL" ]]; then
            missing+=("AI_RELAY_API_KEY/AI_RELAY_BASE_URL (or the complete legacy OPENROUTER pair)")
          fi

          if [[ -n "$AI_RELAY_PRIMARY_MODEL" || -n "$AI_RELAY_FALLBACK_MODEL" ]]; then
            [[ -n "$AI_RELAY_PRIMARY_MODEL" ]] || missing+=("AI_RELAY_PRIMARY_MODEL")
            [[ -n "$AI_RELAY_FALLBACK_MODEL" ]] || missing+=("AI_RELAY_FALLBACK_MODEL")
            primary_model="$AI_RELAY_PRIMARY_MODEL"
            fallback_model="$AI_RELAY_FALLBACK_MODEL"
          else
            [[ -n "$ALGO_COACH_MODEL" ]] || missing+=("AI_RELAY_PRIMARY_MODEL (or legacy ALGO_COACH_MODEL)")
            [[ -n "$ALGO_COACH_FALLBACK_MODEL" ]] || missing+=("AI_RELAY_FALLBACK_MODEL (or legacy ALGO_COACH_FALLBACK_MODEL)")
            primary_model="$ALGO_COACH_MODEL"
            fallback_model="$ALGO_COACH_FALLBACK_MODEL"
          fi

          [[ -n "$CATALOG_AI_MODEL" ]] || missing+=("CATALOG_AI_MODEL")
          [[ -n "$AI_RELAY_PRICING_JSON" ]] || missing+=("AI_RELAY_PRICING_JSON")

          if (( ${#missing[@]} )); then
            printf '::error title=Incomplete catalog AI relay configuration::Missing GitHub Environment values: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          if [[ "$primary_model" == "$fallback_model" ]]; then
            echo "::error title=Invalid catalog AI relay configuration::Primary and fallback models must be different."
            exit 1
          fi

          if [[ "$CATALOG_AI_MODEL" != "$primary_model" && "$CATALOG_AI_MODEL" != "$fallback_model" ]]; then
            echo "::error title=Invalid catalog AI relay configuration::CATALOG_AI_MODEL must use the configured primary or fallback relay model."
            exit 1
          fi

          pnpm ai:preflight
      - name: Discover unreviewed exercises at a fixed commit
        run: pnpm catalog:discover -- --output "$DISCOVERY_REPORT" --ingest --reviewer "github:${GITHUB_ACTOR}"
      - name: Validate ingested discovery drafts
        run: pnpm catalog:validate
      - name: Upload non-publishable review drafts
        uses: actions/upload-artifact@v4
        with:
          name: exercism-discovery-review-${{ github.run_id }}
          path: ${{ env.DISCOVERY_REPORT }}
          if-no-files-found: error
          retention-days: 30

  catalog-anomaly-monitor:
    needs: [sync-database-candidates, discover-review-drafts]
    if: always() && (github.event_name == 'schedule' || inputs.bootstrap != true)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: catalog-sync-production
    env:
      NODE_VERSION: '22.13.0'
      PNPM_VERSION: '11.7.0'
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: ${{ secrets.CATALOG_DATABASE_URL }}
      DB_SCHEMA: algocoach
      DB_SINGLETON_ENABLED: 'true'
      CATALOG_SYNC_ENABLED: 'true'
      CATALOG_ANOMALY_DELTA_THRESHOLD: ${{ vars.CATALOG_ANOMALY_DELTA_THRESHOLD || '25' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate the restricted catalog URL
        run: pnpm catalog:db:preflight
      - name: Monitor catalog sync anomalies
        run: pnpm catalog:monitor

  deterministic-fixture-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_VERSION: '22.13.0'
      PNPM_VERSION: '11.7.0'
      CATALOG_WORKSPACE: .catalog/exercism-fixture-workspace.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build deterministic review fixture
        run: pnpm catalog:sync -- --fixture --workspace "$CATALOG_WORKSPACE"
      - name: Validate deterministic review fixture
        run: pnpm catalog:validate -- --fixture --workspace "$CATALOG_WORKSPACE"
      - name: Upload reviewable fixture workspace
        uses: actions/upload-artifact@v4
        with:
          name: exercism-catalog-fixture-${{ github.run_id }}
          path: ${{ env.CATALOG_WORKSPACE }}
          if-no-files-found: error
          retention-days: 30
